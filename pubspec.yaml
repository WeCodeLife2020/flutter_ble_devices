name: flutter_ble_devices
description: "Flutter plugin for Viatom/Lepu BLE medical devices (ECG, Oximeter, BP). Wraps the official lepu-blepro Android SDK."
version: 1.0.0


environment:
  sdk: ^3.10.7
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  flutter_blue_plus: ^1.34.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.wecodelife.flutter_ble_devices
        pluginClass: FlutterBleDevicesPlugin
      ios:
        pluginClass: FlutterBleDevicesPlugin
